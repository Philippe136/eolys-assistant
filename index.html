<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Eolys Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ed;
    --surface: #ffffff;
    --surface2: #f0ece5;
    --border: #e0d9cf;
    --ink: #1a1714;
    --ink-muted: #7a7268;
    --ink-dim: #b5afa6;
    --accent: #c8410a;
    --accent-light: #f5ede8;
    --accent2: #1a6b3c;
    --accent2-light: #e8f3ec;
    --yellow: #d4a017;
    --yellow-light: #fdf6e3;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo { display: flex; flex-direction: column; gap: 2px; }
  .logo-name { font-size: 20px; font-weight: 800; color: var(--ink); letter-spacing: -0.5px; }
  .logo-name span { color: var(--accent); }
  .logo-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-dim); letter-spacing: 1px; text-transform: uppercase; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 0 3px var(--accent2-light);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px var(--accent2-light); }
    50% { box-shadow: 0 0 0 6px rgba(26,107,60,0.1); }
  }

  .steps-bar { display: flex; align-items: center; margin-bottom: 28px; }
  .step-item { display: flex; align-items: center; flex: 1; }
  .step-item:last-child { flex: none; }
  .step-circle {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--border); background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-dim); flex-shrink: 0; transition: all 0.3s;
  }
  .step-circle.active { border-color: var(--accent); background: var(--accent); color: white; }
  .step-circle.done { border-color: var(--accent2); background: var(--accent2); color: white; }
  .step-line { flex: 1; height: 2px; background: var(--border); transition: background 0.3s; }
  .step-line.done { background: var(--accent2); }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; margin-bottom: 16px;
    animation: slideUp 0.3s ease both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--ink-dim); letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .card-label::before { content: ''; width: 16px; height: 1px; background: var(--ink-dim); }

  .context-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .ctx-btn {
    padding: 12px 16px; border: 2px solid var(--border); border-radius: 10px;
    background: var(--surface); cursor: pointer; font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 600; color: var(--ink-muted); transition: all 0.15s;
    text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .ctx-btn:hover, .ctx-btn.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .ctx-btn .ctx-icon { font-size: 18px; }
  .ctx-btn .ctx-label { font-size: 12px; }

  .project-input, .transcript-area {
    width: 100%; padding: 14px 16px; border: 2px solid var(--border);
    border-radius: 10px; background: var(--surface); font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 500; color: var(--ink); outline: none;
    transition: border-color 0.2s; -webkit-appearance: none;
  }
  .project-input:focus, .transcript-area:focus { border-color: var(--accent); }
  .project-input::placeholder, .transcript-area::placeholder { color: var(--ink-dim); font-weight: 400; }
  .transcript-area { min-height: 160px; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.7; resize: vertical; }

  .btn-primary {
    width: 100%; padding: 16px 24px; background: var(--accent); color: white;
    border: none; border-radius: 10px; font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-primary:hover:not(:disabled) { background: #a33508; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-secondary {
    width: 100%; padding: 13px 24px; background: transparent; color: var(--ink-muted);
    border: 2px solid var(--border); border-radius: 10px; font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  .btn-secondary:hover { border-color: var(--ink-muted); color: var(--ink); }

  .loading-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 40px 24px; text-align: center;
    animation: slideUp 0.3s ease both;
  }
  .loading-spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  .loading-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-dim); }

  .result-section { margin-bottom: 16px; }
  .result-section-title {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-dim);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .result-section-title::before { content: ''; width: 16px; height: 1px; background: var(--ink-dim); }

  .result-block {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; font-size: 14px; line-height: 1.7;
    color: var(--ink); white-space: pre-wrap;
  }
  .result-block.highlight { background: var(--accent-light); border-color: rgba(200,65,10,0.2); }

  .action-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .action-item:last-child { border-bottom: none; padding-bottom: 0; }
  .action-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-top: 8px; flex-shrink: 0; }
  .action-text { font-size: 14px; line-height: 1.6; color: var(--ink); }

  .copy-btn {
    display: flex; align-items: center; gap: 6px; padding: 8px 14px;
    background: transparent; border: 1px solid var(--border); border-radius: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-muted);
    cursor: pointer; transition: all 0.15s; margin-top: 10px; float: right;
  }
  .copy-btn:hover { border-color: var(--ink-muted); color: var(--ink); }
  .copy-btn.copied { border-color: var(--accent2); color: var(--accent2); background: var(--accent2-light); }

  .tag {
    display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px;
    border-radius: 20px; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500; letter-spacing: 0.5px;
  }
  .tag-client { background: var(--accent-light); color: var(--accent); }
  .tag-fournisseur { background: var(--yellow-light); color: var(--yellow); }
  .tag-interne { background: var(--accent2-light); color: var(--accent2); }

  .error-card {
    background: #fff5f5; border: 1px solid #fcc; border-radius: var(--radius);
    padding: 20px; color: #c00; font-size: 14px; animation: slideUp 0.3s ease both;
  }

  .clearfix::after { content: ''; display: table; clear: both; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">
      <div class="logo-name">Eolys<span>.</span>Assistant</div>
      <div class="logo-sub">Traitement des appels</div>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="steps-bar">
    <div class="step-item">
      <div class="step-circle active" id="step1">1</div>
      <div class="step-line" id="line1"></div>
    </div>
    <div class="step-item">
      <div class="step-circle" id="step2">2</div>
      <div class="step-line" id="line2"></div>
    </div>
    <div class="step-item">
      <div class="step-circle" id="step3">3</div>
    </div>
  </div>

  <!-- STEP 1 -->
  <div id="screen-input">
    <div class="card">
      <div class="card-label">Type d'appel</div>
      <div class="context-grid">
        <button class="ctx-btn" onclick="selectType('client')" id="btn-client">
          <span class="ctx-icon">🤝</span><span class="ctx-label">Client</span>
        </button>
        <button class="ctx-btn" onclick="selectType('fournisseur')" id="btn-fournisseur">
          <span class="ctx-icon">📦</span><span class="ctx-label">Fournisseur</span>
        </button>
        <button class="ctx-btn" onclick="selectType('prospect')" id="btn-prospect">
          <span class="ctx-icon">🎯</span><span class="ctx-label">Prospect</span>
        </button>
        <button class="ctx-btn" onclick="selectType('interne')" id="btn-interne">
          <span class="ctx-icon">👷</span><span class="ctx-label">Interne</span>
        </button>
      </div>
      <input class="project-input" id="project-name" type="text"
        placeholder="Projet ou interlocuteur (ex: GICRAM Rousset, Distech...)"
        autocomplete="off" autocorrect="off" />
    </div>

    <div class="card">
      <div class="card-label">Transcription de l'appel</div>
      <textarea class="transcript-area" id="transcript"
        placeholder="Colle ici la transcription depuis les Notes iPhone..."></textarea>
    </div>

    <button class="btn-primary" onclick="processCall()">
      <span>⚡</span> Générer le compte rendu
    </button>
  </div>

  <!-- STEP 2 : LOADING -->
  <div id="screen-loading" class="hidden">
    <div class="loading-card">
      <div class="loading-spinner"></div>
      <div class="loading-text">Analyse en cours...</div>
      <div class="loading-sub" id="loading-msg">Lecture de la transcription</div>
    </div>
  </div>

  <!-- STEP 3 : RÉSULTAT -->
  <div id="screen-result" class="hidden">
    <div class="card">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
        <span id="result-tag" class="tag"></span>
        <span style="font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-dim);" id="result-date"></span>
      </div>
      <div style="font-size:18px; font-weight:700;" id="result-title"></div>
    </div>

    <div class="card">
      <div class="result-section">
        <div class="result-section-title">Résumé</div>
        <div class="result-block" id="result-summary"></div>
      </div>
    </div>

    <div class="card">
      <div class="result-section">
        <div class="result-section-title">Actions à faire</div>
        <div id="result-actions"></div>
      </div>
    </div>

    <div class="card">
      <div class="result-section">
        <div class="result-section-title">Mail de suivi prêt</div>
        <div class="result-block highlight" id="result-email"></div>
        <div class="clearfix">
          <button class="copy-btn" onclick="copyEmail()" id="copy-email-btn">📋 Copier le mail</button>
        </div>
      </div>
    </div>

    <button class="btn-primary" onclick="newCall()" style="background:var(--ink); margin-top:8px;">
      <span>↩</span> Nouvel appel
    </button>
  </div>

  <!-- ERROR -->
  <div id="screen-error" class="hidden">
    <div class="error-card" id="error-msg"></div>
    <button class="btn-secondary" onclick="resetToInput()">Réessayer</button>
  </div>

</div>

<script>
  let selectedType = null;
  let lastEmailContent = '';
  let pollingInterval = null;

  // ── Mode iOS : polling automatique si ?callId= dans l'URL ────────────────
  const urlParams = new URLSearchParams(window.location.search);
  const autoTranscript = urlParams.get('transcript');
  const autoCallId     = urlParams.get('callId');

  if (autoTranscript) {
    document.getElementById('transcript').value = decodeURIComponent(autoTranscript);
  }

  if (autoCallId) {
    setStep(2);
    showScreen('loading');
    document.getElementById('loading-msg').textContent = 'Traitement de l\'enregistrement…';
    startPolling(autoCallId);
  }

  function startPolling(callId) {
    let attempts = 0;
    const MAX_ATTEMPTS = 90; // 3 minutes max (90 × 2s)
    pollingInterval = setInterval(async () => {
      attempts++;
      if (attempts > MAX_ATTEMPTS) {
        clearInterval(pollingInterval);
        document.getElementById('error-msg').textContent = '❌ Délai dépassé. Réessaie dans quelques instants.';
        setStep(1); showScreen('error');
        return;
      }
      try {
        const res  = await fetch(`/api/status?callId=${callId}`);
        const data = await res.json();
        if (data.status === 'done') {
          clearInterval(pollingInterval);
          const result = {
            titre:   data.titre,
            resume:  data.resume,
            actions: data.actions ?? [],
            email:   data.email,
          };
          displayResult(result, data.call_type ?? 'client', data.project_name ?? '');
        } else if (data.status === 'error') {
          clearInterval(pollingInterval);
          document.getElementById('error-msg').textContent = '❌ ' + (data.error ?? 'Erreur inconnue');
          setStep(1); showScreen('error');
        }
      } catch (e) {
        console.warn('Polling error:', e);
      }
    }, 2000);
  }

  function selectType(type) {
    selectedType = type;
    ['client','fournisseur','prospect','interne'].forEach(t =>
      document.getElementById('btn-' + t).classList.remove('selected'));
    document.getElementById('btn-' + type).classList.add('selected');
  }

  function setStep(n) {
    for (let i = 1; i <= 3; i++) {
      const c = document.getElementById('step' + i);
      c.classList.remove('active','done');
      if (i < n) { c.classList.add('done'); c.textContent = '✓'; }
      else if (i === n) { c.classList.add('active'); c.textContent = i; }
      else c.textContent = i;
    }
    for (let i = 1; i <= 2; i++) {
      const l = document.getElementById('line' + i);
      if (l) l.classList.toggle('done', i < n);
    }
  }

  function showScreen(name) {
    ['input','loading','result','error'].forEach(s =>
      document.getElementById('screen-' + s).classList.add('hidden'));
    document.getElementById('screen-' + name).classList.remove('hidden');
  }

  const loadingMessages = [
    'Lecture de la transcription...',
    'Identification des points clés...',
    'Rédaction du compte rendu...',
    'Préparation du mail de suivi...'
  ];

  async function processCall() {
    const transcript = document.getElementById('transcript').value.trim();
    const project = document.getElementById('project-name').value.trim();
    if (!transcript) { alert('Colle la transcription de l\'appel.'); return; }
    if (!selectedType) { alert('Sélectionne le type d\'appel.'); return; }

    setStep(2);
    showScreen('loading');

    let msgIdx = 0;
    const msgInterval = setInterval(() => {
      msgIdx = (msgIdx + 1) % loadingMessages.length;
      document.getElementById('loading-msg').textContent = loadingMessages[msgIdx];
    }, 1800);

    const systemPrompt = `Tu es l'assistant interne d'Eolys Solutions, entreprise GTB basée à La Ciotat. Spécialiste Distech Controls, projets 100k-500k€ sur la Côte d'Azur. Dirigeant : David Cohen.
Tu reçois la transcription d'un appel téléphonique professionnel. Produis un compte rendu structuré en JSON.
Réponds UNIQUEMENT avec un objet JSON valide, sans markdown ni backticks.
Format :
{
  "titre": "Titre court de l'appel",
  "resume": "Résumé factuel en 3-5 phrases",
  "actions": ["Action 1", "Action 2", "Action 3"],
  "email": "Objet: ...\\n\\nBonjour [Prénom],\\n\\n[Corps du mail]\\n\\nCordialement,\\nDavid Cohen\\nEolys Solutions"
}`;

    try {
      const response = await fetch('/api/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: 'user', content: `Type: ${selectedType}\nProjet: ${project || 'Non précisé'}\n\nTranscription:\n${transcript}` }]
        })
      });

      clearInterval(msgInterval);
      const data = await response.json();
      if (!response.ok) {
        const errMsg = data?.error?.message || data?.error || JSON.stringify(data);
        throw new Error('Erreur API ' + response.status + ' : ' + errMsg);
      }
      const raw = data.content.map(b => b.text || '').join('');
      const result = JSON.parse(raw.replace(/```json|```/g, '').trim());
      displayResult(result, selectedType, project);
    } catch(err) {
      clearInterval(msgInterval);
      document.getElementById('error-msg').textContent = '❌ ' + err.message;
      setStep(1);
      showScreen('error');
    }
  }

  function displayResult(result, type, project) {
    const tagMap = {
      client: ['tag-client','CLIENT'], fournisseur: ['tag-fournisseur','FOURNISSEUR'],
      prospect: ['tag-client','PROSPECT'], interne: ['tag-interne','INTERNE']
    };
    const [tagClass, tagLabel] = tagMap[type] || ['tag-interne', type.toUpperCase()];
    document.getElementById('result-tag').className = 'tag ' + tagClass;
    document.getElementById('result-tag').textContent = tagLabel;
    document.getElementById('result-date').textContent = new Date().toLocaleDateString('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
    document.getElementById('result-title').textContent = result.titre || project;
    document.getElementById('result-summary').textContent = result.resume || '';

    const actionsEl = document.getElementById('result-actions');
    actionsEl.innerHTML = '';
    (result.actions || []).forEach(action => {
      const div = document.createElement('div');
      div.className = 'action-item';
      div.innerHTML = `<div class="action-dot"></div><div class="action-text">${action}</div>`;
      actionsEl.appendChild(div);
    });

    lastEmailContent = result.email || '';
    document.getElementById('result-email').textContent = lastEmailContent;
    setStep(3);
    showScreen('result');
    window.scrollTo(0, 0);
  }

  function copyEmail() {
    navigator.clipboard.writeText(lastEmailContent).then(() => {
      const btn = document.getElementById('copy-email-btn');
      btn.textContent = '✓ Copié !';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 Copier le mail'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function newCall() {
    document.getElementById('transcript').value = '';
    document.getElementById('project-name').value = '';
    selectedType = null;
    ['client','fournisseur','prospect','interne'].forEach(t =>
      document.getElementById('btn-' + t).classList.remove('selected'));
    setStep(1);
    showScreen('input');
    window.scrollTo(0, 0);
  }

  function resetToInput() { setStep(1); showScreen('input'); }
</script>
</body>
</html>
