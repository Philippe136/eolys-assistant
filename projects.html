<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eolys — Projets</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ed;
    --surface: #ffffff;
    --surface2: #f0ece5;
    --border: #e0d9cf;
    --ink: #1a1714;
    --ink-muted: #7a7268;
    --ink-dim: #b5afa6;
    --accent: #c8410a;
    --accent-light: #f5ede8;
    --green: #1a6b3c;
    --green-light: #e8f3ec;
    --yellow: #d4a017;
    --yellow-light: #fdf6e3;
    --red: #b91c1c;
    --red-light: #fef2f2;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--ink); font-family: 'Syne', sans-serif; min-height: 100vh; }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .btn-ghost {
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--ink-muted); background: none; border: none; cursor: pointer;
    padding: 6px 12px; border-radius: 8px; text-decoration: none;
    transition: background 0.15s, color 0.15s;
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--ink); }

  /* ── Main ── */
  main { max-width: 900px; margin: 0 auto; padding: 32px 24px 96px; }
  .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
  .page-subtitle { font-size: 14px; color: var(--ink-muted); margin-bottom: 28px; }

  /* ── Stats bar ── */
  .stats { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
  .stat {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 20px; flex: 1; min-width: 80px; text-align: center;
  }
  .stat-value { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 11px; font-weight: 600; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── Project cards grid ── */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  .project-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: border-color 0.15s, box-shadow 0.15s;
    cursor: default;
  }
  .project-card:hover { border-color: var(--ink-dim); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

  .project-card-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.2px;
    margin-bottom: 14px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.3;
  }

  .project-card-name .icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  /* ── Progress bar ── */
  .progress-wrap { margin-bottom: 14px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }
  .progress-fill.complete { background: var(--green); }

  /* ── Mini stats ── */
  .card-stats {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    margin-top: 4px;
  }
  .card-stat { font-size: 12px; color: var(--ink-muted); display: flex; align-items: center; gap: 4px; }
  .card-stat span { font-weight: 600; color: var(--ink); }

  .badge-mini {
    font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 5px;
    text-transform: uppercase; letter-spacing: 0.2px;
  }
  .badge-mini-green { background: var(--green-light); color: var(--green); }
  .badge-mini-yellow { background: var(--yellow-light); color: var(--yellow); }
  .badge-mini-red { background: var(--red-light); color: var(--red); }

  .last-activity {
    font-size: 11px;
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 10px;
  }

  /* ── Filtre projets ── */
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    width: fit-content;
  }
  .btn-filter {
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
    padding: 6px 18px; border-radius: 7px; border: none; background: none;
    color: var(--ink-muted); cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .btn-filter.active { background: var(--accent); color: #fff; }
  .btn-filter:hover:not(.active) { color: var(--ink); }

  /* ── Empty / loading ── */
  .state-empty, .state-loading, .state-error {
    text-align: center; padding: 64px 24px; color: var(--ink-muted);
    grid-column: 1/-1;
  }
  .state-loading-dot {
    display: inline-block; width: 6px; height: 6px; background: var(--ink-dim);
    border-radius: 50%; animation: pulse 1s infinite; margin: 0 2px;
  }
  .state-loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .state-loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50%       { opacity: 1;   transform: scale(1); }
  }

  @media (max-width: 640px) {
    main { padding: 20px 16px 64px; }
    .projects-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Eolys Assistant
  </div>
  <div class="header-actions">
    <a href="/dashboard" class="btn-ghost">Tableau de bord</a>
    <a href="/actions"   class="btn-ghost">Actions</a>
  </div>
</header>

<main>
  <div class="page-title">Projets</div>
  <p class="page-subtitle">Vue synthèse par projet — Eolys Solutions</p>

  <div class="stats" id="stats" style="display:none">
    <div class="stat">
      <div class="stat-value" id="stat-projects">—</div>
      <div class="stat-label">Projets</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-calls">—</div>
      <div class="stat-label">Appels</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-actions-todo" style="color:var(--accent)">—</div>
      <div class="stat-label">Actions restantes</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-actions-done" style="color:var(--green)">—</div>
      <div class="stat-label">Actions faites</div>
    </div>
  </div>

  <div class="filter-bar" id="filter-bar" style="display:none">
    <button class="btn-filter active" id="btn-active"   onclick="setFilter('active')">Actifs</button>
    <button class="btn-filter"        id="btn-all"      onclick="setFilter('all')">Tous</button>
  </div>

  <div class="projects-grid" id="projects-grid">
    <div class="state-loading" style="grid-column:1/-1">
      <span class="state-loading-dot"></span>
      <span class="state-loading-dot"></span>
      <span class="state-loading-dot"></span>
    </div>
  </div>
</main>

<!-- Modal login (même pattern que dashboard) -->
<div id="login-overlay" style="display:none;position:fixed;inset:0;background:rgba(26,23,20,0.7);z-index:999;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;padding:40px 48px;text-align:center;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.2)">
    <div style="font-size:32px;margin-bottom:12px">🔐</div>
    <h2 style="font-size:20px;margin:0 0 6px">Accès dashboard</h2>
    <p style="color:var(--ink-muted);font-size:13px;margin:0 0 24px">Eolys Solutions — accès restreint</p>
    <input type="password" id="login-password"
      style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;outline:none;margin-bottom:12px;box-sizing:border-box"
      placeholder="Mot de passe" onkeydown="if(event.key==='Enter')submitLogin()" />
    <div id="login-error" style="color:#c8410a;font-size:13px;margin-bottom:10px;display:none"></div>
    <button onclick="submitLogin()"
      style="width:100%;padding:11px;background:#c8410a;color:#fff;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer">
      Connexion
    </button>
  </div>
</div>

<script>
let allProjects  = [];
let currentFilter = 'active';

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setFilter(f) {
  currentFilter = f;
  document.getElementById('btn-active').classList.toggle('active', f === 'active');
  document.getElementById('btn-all').classList.toggle('active',    f === 'all');
  renderProjects();
}

function renderProjects() {
  // Filtrer: "active" = dernier appel < 60 jours
  const now = Date.now();
  const filtered = currentFilter === 'active'
    ? allProjects.filter(p => (now - new Date(p.last_call_at)) < 60 * 24 * 3600 * 1000)
    : allProjects;

  const grid = document.getElementById('projects-grid');

  if (!filtered.length) {
    grid.innerHTML = `<div class="state-empty" style="grid-column:1/-1">
      ${currentFilter === 'active' ? 'Aucun projet actif ces 60 derniers jours.' : 'Aucun projet.'}
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(renderProjectCard).join('');
}

function renderProjectCard(p) {
  const total       = p.total_actions  || 0;
  const done        = p.done_actions   || 0;
  const todo        = total - done;
  const pct         = total > 0 ? Math.round(done / total * 100) : 0;
  const allDone     = total > 0 && todo === 0;

  const progressBar = total > 0 ? `
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Actions</span>
        <span>${done}/${total}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill ${allDone ? 'complete' : ''}" style="width:${pct}%"></div>
      </div>
    </div>` : '';

  const statusBadges = [
    p.done_calls       ? `<span class="badge-mini badge-mini-green">${p.done_calls} traités</span>` : '',
    p.processing_calls ? `<span class="badge-mini badge-mini-yellow">${p.processing_calls} en cours</span>` : '',
    p.error_calls      ? `<span class="badge-mini badge-mini-red">${p.error_calls} erreurs</span>` : '',
  ].filter(Boolean).join('');

  return `
    <div class="project-card">
      <div class="project-card-name">
        <span class="icon">📁</span>
        <span>${escapeHtml(p.project_name || 'Sans nom')}</span>
      </div>
      ${progressBar}
      <div class="card-stats">
        <span class="card-stat">📞 <span>${p.call_count}</span> appel${p.call_count > 1 ? 's' : ''}</span>
        ${todo > 0 ? `<span class="card-stat" style="color:var(--accent)">☐ <span style="color:var(--accent)">${todo}</span> à faire</span>` : ''}
        ${statusBadges}
      </div>
      <div class="last-activity">Dernier appel : ${formatDate(p.last_call_at)}</div>
    </div>`;
}

function showLoginModal() {
  const overlay = document.getElementById('login-overlay');
  overlay.style.display = 'flex';
  setTimeout(() => document.getElementById('login-password')?.focus(), 50);
}
function hideLoginModal() { document.getElementById('login-overlay').style.display = 'none'; }

async function submitLogin() {
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    const res = await fetch('/api/auth', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });
    if (!res.ok) {
      const data = await res.json();
      errEl.textContent = data.error || 'Mot de passe incorrect.';
      errEl.style.display = 'block'; return;
    }
    hideLoginModal(); loadProjects();
  } catch {
    errEl.textContent = 'Erreur réseau.'; errEl.style.display = 'block';
  }
}

async function loadProjects() {
  try {
    const res = await fetch('/api/projects');
    if (res.status === 401) { showLoginModal(); return; }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allProjects = await res.json();

    // Stats globales
    const totalProjects = allProjects.length;
    const totalCalls    = allProjects.reduce((s, p) => s + p.call_count, 0);
    const totalActTodo  = allProjects.reduce((s, p) => s + Math.max(0, (p.total_actions||0) - (p.done_actions||0)), 0);
    const totalActDone  = allProjects.reduce((s, p) => s + (p.done_actions||0), 0);

    document.getElementById('stats').style.display = allProjects.length ? 'flex' : 'none';
    document.getElementById('filter-bar').style.display = allProjects.length ? 'flex' : 'none';
    document.getElementById('stat-projects').textContent    = totalProjects;
    document.getElementById('stat-calls').textContent       = totalCalls;
    document.getElementById('stat-actions-todo').textContent = totalActTodo;
    document.getElementById('stat-actions-done').textContent = totalActDone;

    renderProjects();
  } catch (err) {
    document.getElementById('projects-grid').innerHTML =
      `<div class="state-error" style="grid-column:1/-1">
         <div>Impossible de charger les projets.</div>
         <div style="color:#b91c1c;font-size:13px;margin-top:6px">${err.message}</div>
       </div>`;
  }
}

loadProjects();
</script>
</body>
</html>
