<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eolys — Tableau de bord</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ed;
    --surface: #ffffff;
    --surface2: #f0ece5;
    --border: #e0d9cf;
    --ink: #1a1714;
    --ink-muted: #7a7268;
    --ink-dim: #b5afa6;
    --accent: #c8410a;
    --accent-light: #f5ede8;
    --green: #1a6b3c;
    --green-light: #e8f3ec;
    --yellow: #d4a017;
    --yellow-light: #fdf6e3;
    --red: #b91c1c;
    --red-light: #fef2f2;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn-ghost {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 8px;
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
  }

  .btn-ghost:hover { background: var(--surface2); color: var(--ink); }

  .btn-primary {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    cursor: pointer;
    padding: 7px 16px;
    border-radius: 8px;
    text-decoration: none;
    transition: opacity 0.15s;
  }

  .btn-primary:hover { opacity: 0.88; }

  /* ── Main ── */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 96px;
  }

  .page-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  .page-subtitle {
    font-size: 14px;
    color: var(--ink-muted);
    margin-bottom: 28px;
  }

  /* ── Stats bar ── */
  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 20px;
    flex: 1;
    min-width: 100px;
    text-align: center;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Call cards ── */
  .calls-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .call-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    cursor: pointer;
  }

  .call-card:hover {
    border-color: var(--ink-dim);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .call-card.expanded { cursor: default; }

  .call-card.selected {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  /* ── Checkbox ── */
  .card-checkbox-wrap {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    cursor: pointer;
    padding: 2px 6px 2px 0;
  }

  .card-checkbox-wrap input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: var(--accent);
    flex-shrink: 0;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.2px;
    line-height: 1.3;
    flex: 1;
  }

  .card-badges {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .badge-done    { background: var(--green-light); color: var(--green); }
  .badge-processing { background: var(--yellow-light); color: var(--yellow); }
  .badge-error   { background: var(--red-light); color: var(--red); }
  .badge-type    { background: var(--surface2); color: var(--ink-muted); }

  /* ── Trash button ── */
  .btn-trash {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    color: var(--ink-dim);
    display: flex;
    align-items: center;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }

  .btn-trash:hover {
    background: var(--red-light);
    color: var(--red);
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--ink-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .card-meta span { display: flex; align-items: center; gap: 4px; }

  .card-resume {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--ink-muted);
    margin-bottom: 14px;
  }

  /* ── Expandable detail ── */
  .card-detail {
    display: none;
    border-top: 1px solid var(--border);
    margin-top: 16px;
    padding-top: 16px;
  }

  .call-card.expanded .card-detail { display: block; }

  .detail-section {
    margin-bottom: 16px;
  }

  .detail-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--ink-dim);
    margin-bottom: 6px;
  }

  .detail-content {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--ink);
  }

  .actions-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .actions-list li {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13.5px;
    line-height: 1.5;
  }

  .actions-list li::before {
    content: "→";
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .email-block {
    background: var(--surface2);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--ink);
    word-break: break-word;
  }

  /* ── Card footer actions ── */
  .card-footer {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .btn-trello {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: #0052cc;
    background: #e6f0ff;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
  }

  .btn-trello:hover { opacity: 0.8; }

  .btn-outlook {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: #0078d4;
    background: #e8f3fc;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
  }

  .btn-outlook:hover { opacity: 0.8; }

  .btn-expand {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-muted);
    background: var(--surface2);
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-expand:hover { background: var(--border); }

  /* ── Delete confirm bar ── */
  .delete-confirm-bar {
    display: none;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--red-light);
    border: 1px solid #fecaca;
    border-radius: 8px;
    flex-wrap: wrap;
  }

  .delete-confirm-text {
    font-size: 13px;
    font-weight: 600;
    color: var(--red);
    flex: 1;
    min-width: 150px;
  }

  .btn-delete-confirm {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    background: var(--red);
    border: none;
    border-radius: 7px;
    padding: 6px 14px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-delete-confirm:hover { opacity: 0.85; }

  .btn-delete-cancel {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-delete-cancel:hover { background: var(--surface2); }

  /* ── Bulk action bar ── */
  .bulk-bar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink);
    color: #fff;
    border-radius: 12px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.22);
    transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
    z-index: 100;
    white-space: nowrap;
  }

  .bulk-bar.visible {
    transform: translateX(-50%) translateY(0);
  }

  .bulk-count {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.75);
  }

  .btn-bulk-delete {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    background: var(--red);
    border: none;
    border-radius: 8px;
    padding: 7px 16px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-bulk-delete:hover { opacity: 0.85; }

  .btn-bulk-cancel {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
  }

  .btn-bulk-cancel:hover { background: rgba(255,255,255,0.1); color: #fff; }

  /* ── Empty / loading state ── */
  .state-empty, .state-loading, .state-error {
    text-align: center;
    padding: 64px 24px;
    color: var(--ink-muted);
  }

  .state-loading-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--ink-dim);
    border-radius: 50%;
    animation: pulse 1s infinite;
    margin: 0 2px;
  }

  .state-loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .state-loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50%       { opacity: 1;   transform: scale(1); }
  }

  .error-text { color: var(--red); font-size: 13px; margin-top: 8px; }

  /* ── Processing spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }

  .spinner {
    display: inline-block;
    width: 10px; height: 10px;
    border: 2px solid var(--yellow);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }

  /* ── Recherche ── */
  .search-bar {
    margin-bottom: 16px;
  }
  .search-input {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--ink-dim); }

  /* ── Pagination ── */
  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-top: 20px;
  }
  .btn-page {
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
    padding: 6px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    background: var(--surface); color: var(--ink); cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-page:hover:not(:disabled) { background: var(--surface2); border-color: var(--accent); }
  .btn-page:disabled { opacity: 0.4; cursor: default; }
  .btn-page.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .page-info { font-size: 12px; color: var(--ink-muted); font-family: 'JetBrains Mono', monospace; }

  /* ── Retry button ── */
  .btn-retry {
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    padding: 5px 12px; border-radius: 7px; border: 1.5px solid var(--red);
    background: transparent; color: var(--red); cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn-retry:hover { background: var(--red); color: #fff; }
  .btn-retry:disabled { opacity: 0.5; cursor: default; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    main { padding: 20px 16px 96px; }
    .card-header { flex-direction: column-reverse; }
    .card-badges { justify-content: flex-start; }
    .stats { gap: 8px; }
    .stat { padding: 10px 14px; }
    .call-card { padding: 16px; }
    .bulk-bar { left: 16px; right: 16px; transform: translateY(100px); width: auto; white-space: normal; }
    .bulk-bar.visible { transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Eolys Assistant
  </div>
  <div class="header-actions">
    <span id="last-refresh" style="font-size:11px;color:var(--ink-dim);font-family:'JetBrains Mono',monospace"></span>
    <a href="/" class="btn-ghost">+ Nouvel appel</a>
  </div>
</header>

<main>
  <div class="page-title">Tableau de bord</div>
  <p class="page-subtitle">Comptes rendus d'appels — Eolys Solutions</p>

  <div class="stats" id="stats" style="display:none">
    <div class="stat">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-done" style="color:var(--green)">—</div>
      <div class="stat-label">Traités</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-processing" style="color:var(--yellow)">—</div>
      <div class="stat-label">En cours</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-error" style="color:var(--red)">—</div>
      <div class="stat-label">Erreurs</div>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="search-input" class="search-input"
      placeholder="🔍 Rechercher par titre, projet, résumé…"
      oninput="filterCalls()" />
  </div>

  <div id="calls-list" class="calls-list">
    <div class="state-loading">
      <span class="state-loading-dot"></span>
      <span class="state-loading-dot"></span>
      <span class="state-loading-dot"></span>
    </div>
  </div>

  <div class="pagination" id="pagination"></div>
</main>

<!-- Modal login -->
<div id="login-overlay" style="display:none;position:fixed;inset:0;background:rgba(26,23,20,0.7);z-index:999;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;padding:40px 48px;text-align:center;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.2)">
    <div style="font-size:32px;margin-bottom:12px">🔐</div>
    <h2 style="font-size:20px;margin:0 0 6px">Accès dashboard</h2>
    <p style="color:var(--ink-muted);font-size:13px;margin:0 0 24px">Eolys Solutions — accès restreint</p>
    <input type="password" id="login-password"
      style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;outline:none;margin-bottom:12px;box-sizing:border-box"
      placeholder="Mot de passe" onkeydown="if(event.key==='Enter')submitLogin()" />
    <div id="login-error" style="color:#c8410a;font-size:13px;margin-bottom:10px;display:none"></div>
    <button onclick="submitLogin()"
      style="width:100%;padding:11px;background:#c8410a;color:#fff;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer">
      Connexion
    </button>
  </div>
</div>

<!-- Bulk delete action bar -->
<div class="bulk-bar" id="bulk-bar">
  <span class="bulk-count" id="bulk-count"></span>
  <button class="btn-bulk-delete" onclick="deleteSelected()">Supprimer</button>
  <button class="btn-bulk-cancel" onclick="clearSelection()">Annuler</button>
</div>

<script>
let expandedId = null;
let autoRefresh = null;
let selectedIds = new Set();

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' })
    + ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function badgeStatus(status) {
  if (status === 'done')       return `<span class="badge badge-done">✓ Traité</span>`;
  if (status === 'processing') return `<span class="badge badge-processing"><span class="spinner"></span> En cours</span>`;
  if (status === 'error')      return `<span class="badge badge-error">✗ Erreur</span>`;
  return `<span class="badge badge-type">${status}</span>`;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCard(call) {
  const isExpanded = expandedId === call.id;
  const isSelected = selectedIds.has(call.id);
  const actions = Array.isArray(call.actions) ? call.actions : (call.actions ? JSON.parse(call.actions) : []);

  const actionsHtml = actions.length
    ? `<ul class="actions-list">${actions.map(a => `<li>${escapeHtml(a)}</li>`).join('')}</ul>`
    : '<span style="color:var(--ink-dim);font-size:13px">Aucune action</span>';

  const trelloBtn = call.trello_url
    ? `<a href="${escapeHtml(call.trello_url)}" target="_blank" class="btn-trello">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="2" width="9" height="14" rx="2"/><rect x="13" y="2" width="9" height="9" rx="2"/></svg>
        Voir Trello
      </a>`
    : '';

  const outlookBtn = call.outlook_draft_url
    ? `<a href="${escapeHtml(call.outlook_draft_url)}" target="_blank" class="btn-outlook">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
        Brouillon Outlook
      </a>`
    : '';

  const resumeText = call.resume || call.error || '';

  const trashIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;

  return `
    <div class="call-card ${isExpanded ? 'expanded' : ''} ${isSelected ? 'selected' : ''}" id="card-${call.id}" onclick="toggleCard('${call.id}', event)">
      <div class="card-header">
        <label class="card-checkbox-wrap" onclick="event.stopPropagation()">
          <input type="checkbox" onchange="toggleSelect('${call.id}', this.checked)" ${isSelected ? 'checked' : ''}>
        </label>
        <div class="card-title">${escapeHtml(call.titre || '(en cours de traitement…)')}</div>
        <div class="card-badges">
          ${badgeStatus(call.status)}
          <span class="badge badge-type">${escapeHtml(call.call_type || '—')}</span>
          ${call.status === 'error' ? `<button class="btn-retry" onclick="retryCall('${call.id}', event)">↺ Réessayer</button>` : ''}
          <button class="btn-trash" onclick="startDelete('${call.id}', event)" title="Supprimer">${trashIcon}</button>
        </div>
      </div>
      <div class="card-meta">
        <span>📅 ${formatDate(call.created_at)}</span>
        ${call.project_name ? `<span>📁 ${escapeHtml(call.project_name)}</span>` : ''}
      </div>
      ${resumeText ? `<div class="card-resume">${escapeHtml(resumeText)}</div>` : ''}

      <div class="delete-confirm-bar" id="delete-confirm-${call.id}">
        <span class="delete-confirm-text">Supprimer ce compte rendu ?</span>
        <button class="btn-delete-confirm" onclick="confirmDelete('${call.id}', event)">Supprimer</button>
        <button class="btn-delete-cancel" onclick="cancelDelete('${call.id}', event)">Annuler</button>
      </div>

      <div class="card-detail">
        ${actions.length ? `
        <div class="detail-section">
          <div class="detail-label">Actions à mener</div>
          <div class="detail-content">${actionsHtml}</div>
        </div>` : ''}

        ${call.email ? `
        <div class="detail-section">
          <div class="detail-label">Brouillon d'e-mail</div>
          <div class="email-block">${escapeHtml(call.email)}</div>
        </div>` : ''}

        <div class="card-footer">
          ${trelloBtn}
          ${outlookBtn}
          <button class="btn-expand" onclick="copyEmail('${call.id}', event)" ${!call.email ? 'style="display:none"' : ''}>
            Copier l'e-mail
          </button>
          <span id="copy-confirm-${call.id}" style="font-size:12px;color:var(--green);display:none">✓ Copié !</span>
        </div>
      </div>
    </div>`;
}

function toggleCard(id, e) {
  if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' ||
      e.target.tagName === 'INPUT' || e.target.tagName === 'LABEL') return;
  expandedId = expandedId === id ? null : id;
  renderList(window._calls);
}

function toggleSelect(id, checked) {
  if (checked) selectedIds.add(id);
  else selectedIds.delete(id);
  // Update card class directly without full re-render
  const card = document.getElementById(`card-${id}`);
  if (card) card.classList.toggle('selected', checked);
  updateBulkBar();
}

function updateBulkBar() {
  const bar = document.getElementById('bulk-bar');
  const count = selectedIds.size;
  if (count > 0) {
    document.getElementById('bulk-count').textContent =
      count === 1 ? '1 sélectionné' : `${count} sélectionnés`;
    bar.classList.add('visible');
  } else {
    bar.classList.remove('visible');
  }
}

function clearSelection() {
  selectedIds.clear();
  document.querySelectorAll('.card-checkbox-wrap input').forEach(cb => cb.checked = false);
  document.querySelectorAll('.call-card.selected').forEach(el => el.classList.remove('selected'));
  updateBulkBar();
}

function startDelete(id, e) {
  e.stopPropagation();
  // Hide any other open confirm bars
  document.querySelectorAll('.delete-confirm-bar').forEach(el => el.style.display = 'none');
  const bar = document.getElementById(`delete-confirm-${id}`);
  if (bar) bar.style.display = 'flex';
}

function cancelDelete(id, e) {
  e.stopPropagation();
  const bar = document.getElementById(`delete-confirm-${id}`);
  if (bar) bar.style.display = 'none';
}

async function confirmDelete(id, e) {
  e.stopPropagation();
  const bar = document.getElementById(`delete-confirm-${id}`);
  if (bar) {
    bar.querySelector('.btn-delete-confirm').textContent = '…';
    bar.querySelector('.btn-delete-confirm').disabled = true;
  }
  try {
    const res = await fetch(`/api/calls?id=${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    // Remove from local data and re-render
    selectedIds.delete(id);
    window._calls = window._calls.filter(c => c.id !== id);
    renderList(window._calls);
    updateBulkBar();
  } catch (err) {
    if (bar) {
      bar.querySelector('.btn-delete-confirm').textContent = 'Supprimer';
      bar.querySelector('.btn-delete-confirm').disabled = false;
      bar.querySelector('.delete-confirm-text').textContent = `Erreur : ${err.message}`;
    }
  }
}

async function deleteSelected() {
  if (!selectedIds.size) return;
  const ids = [...selectedIds].join(',');
  const btn = document.querySelector('.btn-bulk-delete');
  btn.textContent = '…';
  btn.disabled = true;
  try {
    const res = await fetch(`/api/calls?ids=${ids}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    selectedIds.clear();
    const idList = ids.split(',');
    window._calls = window._calls.filter(c => !idList.includes(c.id));
    renderList(window._calls);
    updateBulkBar();
  } catch (err) {
    btn.textContent = 'Supprimer';
    btn.disabled = false;
    alert(`Erreur lors de la suppression : ${err.message}`);
  }
}

function copyEmail(id, e) {
  e.stopPropagation();
  const call = window._calls.find(c => c.id === id);
  if (!call?.email) return;
  navigator.clipboard.writeText(call.email).then(() => {
    document.getElementById(`copy-confirm-${id}`).style.display = 'inline';
    setTimeout(() => {
      const el = document.getElementById(`copy-confirm-${id}`);
      if (el) el.style.display = 'none';
    }, 2000);
  });
}

const PAGE_SIZE = 20;
let currentPage = 1;
let currentQuery = '';

function filterCalls() {
  currentQuery = document.getElementById('search-input').value.toLowerCase().trim();
  currentPage  = 1;
  renderFiltered();
}

function renderFiltered() {
  const all      = window._calls || [];
  const filtered = currentQuery
    ? all.filter(c =>
        (c.titre        || '').toLowerCase().includes(currentQuery) ||
        (c.project_name || '').toLowerCase().includes(currentQuery) ||
        (c.resume       || '').toLowerCase().includes(currentQuery) ||
        (c.call_type    || '').toLowerCase().includes(currentQuery)
      )
    : all;

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;

  const pageItems = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
  const container = document.getElementById('calls-list');

  if (!filtered.length) {
    container.innerHTML = `<div class="state-empty">${currentQuery ? 'Aucun résultat pour cette recherche.' : 'Aucun appel traité pour le moment.'}</div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  container.innerHTML = pageItems.map(renderCard).join('');
  renderPagination(totalPages, filtered.length);
}

function renderPagination(totalPages, total) {
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }

  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end   = Math.min(currentPage * PAGE_SIZE, total);

  pg.innerHTML = `
    <button class="btn-page" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>←</button>
    <span class="page-info">${start}–${end} / ${total}</span>
    <button class="btn-page" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>→</button>
  `;
}

function goPage(page) {
  currentPage = page;
  renderFiltered();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderList(calls) {
  window._calls = calls;
  const container = document.getElementById('calls-list');

  if (!calls.length) {
    container.innerHTML = '<div class="state-empty">Aucun appel traité pour le moment.</div>';
    document.getElementById('stats').style.display = 'none';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  // Stats calculées sur l'ensemble (pas juste la page)
  document.getElementById('stats').style.display = 'flex';
  document.getElementById('stat-total').textContent      = calls.length;
  document.getElementById('stat-done').textContent       = calls.filter(c => c.status === 'done').length;
  document.getElementById('stat-processing').textContent = calls.filter(c => c.status === 'processing').length;
  document.getElementById('stat-error').textContent      = calls.filter(c => c.status === 'error').length;

  renderFiltered();

  // Auto-refresh si des appels sont en cours
  clearTimeout(autoRefresh);
  if (calls.some(c => c.status === 'processing')) {
    autoRefresh = setTimeout(loadCalls, 5000);
  }
}

async function retryCall(id, e) {
  e.stopPropagation();
  const btn = e.currentTarget;
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const res = await fetch(`/api/retry?id=${id}`, { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    await loadCalls();
  } catch (err) {
    btn.disabled = false;
    btn.textContent = '↺ Réessayer';
    alert(`Erreur lors du réessai : ${err.message}`);
  }
}

function showLoginModal() {
  const overlay = document.getElementById('login-overlay');
  overlay.style.display = 'flex';
  setTimeout(() => document.getElementById('login-password')?.focus(), 50);
}

function hideLoginModal() {
  document.getElementById('login-overlay').style.display = 'none';
}

async function submitLogin() {
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });
    if (!res.ok) {
      const data = await res.json();
      errEl.textContent = data.error || 'Mot de passe incorrect.';
      errEl.style.display = 'block';
      return;
    }
    hideLoginModal();
    loadCalls();
  } catch {
    errEl.textContent = 'Erreur réseau.';
    errEl.style.display = 'block';
  }
}

async function loadCalls() {
  try {
    const res = await fetch('/api/calls');
    if (res.status === 401) {
      showLoginModal();
      return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const calls = await res.json();
    renderList(calls);
    document.getElementById('last-refresh').textContent =
      'Mis à jour ' + new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  } catch (err) {
    document.getElementById('calls-list').innerHTML =
      `<div class="state-error">
        <div>Impossible de charger les appels.</div>
        <div class="error-text">${err.message}</div>
       </div>`;
  }
}

loadCalls();
</script>
