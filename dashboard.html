<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eolys — Tableau de bord</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ed;
    --surface: #ffffff;
    --surface2: #f0ece5;
    --border: #e0d9cf;
    --ink: #1a1714;
    --ink-muted: #7a7268;
    --ink-dim: #b5afa6;
    --accent: #c8410a;
    --accent-light: #f5ede8;
    --green: #1a6b3c;
    --green-light: #e8f3ec;
    --yellow: #d4a017;
    --yellow-light: #fdf6e3;
    --red: #b91c1c;
    --red-light: #fef2f2;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn-ghost {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 8px;
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
  }

  .btn-ghost:hover { background: var(--surface2); color: var(--ink); }

  .btn-primary {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    cursor: pointer;
    padding: 7px 16px;
    border-radius: 8px;
    text-decoration: none;
    transition: opacity 0.15s;
  }

  .btn-primary:hover { opacity: 0.88; }

  /* ── Main ── */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  .page-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  .page-subtitle {
    font-size: 14px;
    color: var(--ink-muted);
    margin-bottom: 28px;
  }

  /* ── Stats bar ── */
  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 20px;
    flex: 1;
    min-width: 100px;
    text-align: center;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Call cards ── */
  .calls-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .call-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    transition: border-color 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }

  .call-card:hover {
    border-color: var(--ink-dim);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .call-card.expanded { cursor: default; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.2px;
    line-height: 1.3;
    flex: 1;
  }

  .card-badges {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .badge-done    { background: var(--green-light); color: var(--green); }
  .badge-processing { background: var(--yellow-light); color: var(--yellow); }
  .badge-error   { background: var(--red-light); color: var(--red); }
  .badge-type    { background: var(--surface2); color: var(--ink-muted); }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--ink-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .card-meta span { display: flex; align-items: center; gap: 4px; }

  .card-resume {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--ink-muted);
    margin-bottom: 14px;
  }

  /* ── Expandable detail ── */
  .card-detail {
    display: none;
    border-top: 1px solid var(--border);
    margin-top: 16px;
    padding-top: 16px;
  }

  .call-card.expanded .card-detail { display: block; }

  .detail-section {
    margin-bottom: 16px;
  }

  .detail-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--ink-dim);
    margin-bottom: 6px;
  }

  .detail-content {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--ink);
  }

  .actions-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .actions-list li {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13.5px;
    line-height: 1.5;
  }

  .actions-list li::before {
    content: "→";
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .email-block {
    background: var(--surface2);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--ink);
    word-break: break-word;
  }

  /* ── Card footer actions ── */
  .card-footer {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .btn-trello {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: #0052cc;
    background: #e6f0ff;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
  }

  .btn-trello:hover { opacity: 0.8; }

  .btn-expand {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-muted);
    background: var(--surface2);
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-expand:hover { background: var(--border); }

  /* ── Empty / loading state ── */
  .state-empty, .state-loading, .state-error {
    text-align: center;
    padding: 64px 24px;
    color: var(--ink-muted);
  }

  .state-loading-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--ink-dim);
    border-radius: 50%;
    animation: pulse 1s infinite;
    margin: 0 2px;
  }

  .state-loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .state-loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50%       { opacity: 1;   transform: scale(1); }
  }

  .error-text { color: var(--red); font-size: 13px; margin-top: 8px; }

  /* ── Processing spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }

  .spinner {
    display: inline-block;
    width: 10px; height: 10px;
    border: 2px solid var(--yellow);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    main { padding: 20px 16px 48px; }
    .card-header { flex-direction: column-reverse; }
    .card-badges { justify-content: flex-start; }
    .stats { gap: 8px; }
    .stat { padding: 10px 14px; }
    .call-card { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Eolys Assistant
  </div>
  <div class="header-actions">
    <span id="last-refresh" style="font-size:11px;color:var(--ink-dim);font-family:'JetBrains Mono',monospace"></span>
    <a href="/" class="btn-ghost">+ Nouvel appel</a>
  </div>
</header>

<main>
  <div class="page-title">Tableau de bord</div>
  <p class="page-subtitle">Comptes rendus d'appels — Eolys Solutions</p>

  <div class="stats" id="stats" style="display:none">
    <div class="stat">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-done" style="color:var(--green)">—</div>
      <div class="stat-label">Traités</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-processing" style="color:var(--yellow)">—</div>
      <div class="stat-label">En cours</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-error" style="color:var(--red)">—</div>
      <div class="stat-label">Erreurs</div>
    </div>
  </div>

  <div id="calls-list" class="calls-list">
    <div class="state-loading">
      <span class="state-loading-dot"></span>
      <span class="state-loading-dot"></span>
      <span class="state-loading-dot"></span>
    </div>
  </div>
</main>

<script>
let expandedId = null;
let autoRefresh = null;

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' })
    + ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function badgeStatus(status) {
  if (status === 'done')       return `<span class="badge badge-done">✓ Traité</span>`;
  if (status === 'processing') return `<span class="badge badge-processing"><span class="spinner"></span> En cours</span>`;
  if (status === 'error')      return `<span class="badge badge-error">✗ Erreur</span>`;
  return `<span class="badge badge-type">${status}</span>`;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCard(call) {
  const isExpanded = expandedId === call.id;
  const actions = Array.isArray(call.actions) ? call.actions : (call.actions ? JSON.parse(call.actions) : []);

  const actionsHtml = actions.length
    ? `<ul class="actions-list">${actions.map(a => `<li>${escapeHtml(a)}</li>`).join('')}</ul>`
    : '<span style="color:var(--ink-dim);font-size:13px">Aucune action</span>';

  const trelloBtn = call.trello_url
    ? `<a href="${call.trello_url}" target="_blank" class="btn-trello">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="2" width="9" height="14" rx="2"/><rect x="13" y="2" width="9" height="9" rx="2"/></svg>
        Voir Trello
      </a>`
    : '';

  const resumeText = call.resume || call.error || '';

  return `
    <div class="call-card ${isExpanded ? 'expanded' : ''}" id="card-${call.id}" onclick="toggleCard('${call.id}', event)">
      <div class="card-header">
        <div class="card-title">${escapeHtml(call.titre || '(en cours de traitement…)')}</div>
        <div class="card-badges">
          ${badgeStatus(call.status)}
          <span class="badge badge-type">${escapeHtml(call.call_type || '—')}</span>
        </div>
      </div>
      <div class="card-meta">
        <span>📅 ${formatDate(call.created_at)}</span>
        ${call.project_name ? `<span>📁 ${escapeHtml(call.project_name)}</span>` : ''}
      </div>
      ${resumeText ? `<div class="card-resume">${escapeHtml(resumeText)}</div>` : ''}

      <div class="card-detail">
        ${actions.length ? `
        <div class="detail-section">
          <div class="detail-label">Actions à mener</div>
          <div class="detail-content">${actionsHtml}</div>
        </div>` : ''}

        ${call.email ? `
        <div class="detail-section">
          <div class="detail-label">Brouillon d'e-mail</div>
          <div class="email-block">${escapeHtml(call.email)}</div>
        </div>` : ''}

        <div class="card-footer">
          ${trelloBtn}
          <button class="btn-expand" onclick="copyEmail('${call.id}', event)" ${!call.email ? 'style="display:none"' : ''}>
            Copier l'e-mail
          </button>
          <span id="copy-confirm-${call.id}" style="font-size:12px;color:var(--green);display:none">✓ Copié !</span>
        </div>
      </div>
    </div>`;
}

function toggleCard(id, e) {
  if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') return;
  expandedId = expandedId === id ? null : id;
  renderList(window._calls);
}

function copyEmail(id, e) {
  e.stopPropagation();
  const call = window._calls.find(c => c.id === id);
  if (!call?.email) return;
  navigator.clipboard.writeText(call.email).then(() => {
    document.getElementById(`copy-confirm-${id}`).style.display = 'inline';
    setTimeout(() => {
      const el = document.getElementById(`copy-confirm-${id}`);
      if (el) el.style.display = 'none';
    }, 2000);
  });
}

function renderList(calls) {
  window._calls = calls;
  const container = document.getElementById('calls-list');

  if (!calls.length) {
    container.innerHTML = '<div class="state-empty">Aucun appel traité pour le moment.</div>';
    return;
  }

  // Stats
  const total = calls.length;
  const done  = calls.filter(c => c.status === 'done').length;
  const processing = calls.filter(c => c.status === 'processing').length;
  const errors = calls.filter(c => c.status === 'error').length;

  document.getElementById('stats').style.display = 'flex';
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-processing').textContent = processing;
  document.getElementById('stat-error').textContent = errors;

  container.innerHTML = calls.map(renderCard).join('');

  // Auto-refresh if any processing
  clearTimeout(autoRefresh);
  if (processing > 0) {
    autoRefresh = setTimeout(loadCalls, 5000);
  }
}

async function loadCalls() {
  try {
    const res = await fetch('/api/calls');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const calls = await res.json();
    renderList(calls);
    document.getElementById('last-refresh').textContent =
      'Mis à jour ' + new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  } catch (err) {
    document.getElementById('calls-list').innerHTML =
      `<div class="state-error">
        <div>Impossible de charger les appels.</div>
        <div class="error-text">${err.message}</div>
       </div>`;
  }
}

loadCalls();
</script>

</body>
</html>
